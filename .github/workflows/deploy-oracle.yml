name: Deploy Avalon to Oracle VM

on:
  push:
    branches:
      - main
    paths:
      - "avalonAPP/**"
      - ".github/workflows/deploy-oracle.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: ${{ secrets.ORACLE_PORT }}
          script_stop: true
          script: |
            /bin/bash --noprofile --norc -lc '
              set -euo pipefail
              set -x
              echo "WHOAMI=$(whoami)"
              echo "PWD=$(pwd)"
              echo "HOME=$HOME"
              export NVM_DIR="$HOME/.nvm"
              echo "NVM_DIR=$NVM_DIR"
              ls -la "$NVM_DIR" || true
              if [ -s "$NVM_DIR/nvm.sh" ]; then
                . "$NVM_DIR/nvm.sh"
                nvm use 20.20.2 >/dev/null || nvm use 20 >/dev/null || nvm use --lts >/dev/null || true
              fi
              command -v node || true
              command -v npm || true
              node -v || true
              npm -v || true
              deploy_root="${{ secrets.ORACLE_APP_DIR }}"
              cd "$deploy_root"
              echo "DEPLOY_ROOT=$(pwd)"

              if [ -d .git ]; then
                repo_root="$(pwd)"
              elif [ -d avalonAPP/.git ]; then
                repo_root="$(pwd)/avalonAPP"
              else
                echo "Unable to find a git repository at $deploy_root"
                exit 1
              fi

              if [ -f package.json ]; then
                app_root="$repo_root"
              elif [ -f "$repo_root/avalonAPP/package.json" ]; then
                app_root="$repo_root/avalonAPP"
              else
                echo "Unable to find package.json under $repo_root"
                exit 1
              fi

              echo "REPO_ROOT=$repo_root"
              echo "APP_ROOT=$app_root"

              cd "$repo_root"
              git fetch origin main
              git reset --hard origin/main

              cd "$app_root"
              npm install
              npm run build

              pkill -f "next start -H 0.0.0.0" || true
              nohup npm start > avalon.log 2>&1 &
              echo $! > .avalon.pid
            '
